<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Ielite</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Outfit:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #D2E3FF;
            --bg: #0C0D10;
            --overlay-bg: #181A1F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            background: var(--bg);
            color: #fff;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            transition: background 0.8s ease;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        .app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 40px 25px;
            position: relative;
        }

        .seek-overlay {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 10;
        }

        .active-seek {
            opacity: 1;
            transform: translateY(-50%) scale(1.2);
        }

        .cover-area {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1/1;
        }

        /* CHANGE: Cover box loading UI */
        .cover-box {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            background: #181A1F;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cover-box::after {
            content: "music_note";
            font-family: 'Material Symbols Rounded';
            font-size: 100px;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            z-index: 0;
        }

        .cover-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
            /* Smooth fade in */
        }

        .cover-box img.loaded {
            opacity: 1;
        }

        .tap-zone {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
        }

        .left-zone {
            left: 0;
        }

        .right-zone {
            right: 0;
        }

        .meta {
            width: 100%;
            max-width: 320px;
        }

        .meta h1 {
            font-family: 'Montserrat';
            font-size: 24px;
        }

        .meta p {
            font-size: 16px;
            color: var(--accent);
            opacity: 0.8;
            font-weight: 300;
        }

        .status-pill {
            background: rgba(210, 227, 255, 0.15);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
            border: 1px solid rgba(210, 227, 255, 0.2);
        }

        .seekbar-box {
            width: 100%;
            max-width: 320px;
            margin: 20px 0;
        }

        .track {
            width: 100%;
            height: 38px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
        }

        .wave-bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 1.5px;
            border-radius: 3px;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .wave-bar.active {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(210, 227, 255, 0.3);
        }

        .times {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 11px;
            color: #777;
            font-weight: bold;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
        }

        .btn-ui {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-ui .material-symbols-rounded {
            font-size: 32px;
            font-variation-settings: 'FILL' 1;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            background: var(--accent);
            color: #000;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn .material-symbols-rounded {
            font-size: 45px;
        }

        .backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 15;
        }

        .backdrop.active {
            display: block;
        }

        .panel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 85%;
            background: var(--overlay-bg);
            border-radius: 40px 40px 0 0;
            transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            z-index: 20;
            padding: 30px 20px;
            scrollbar-width: none;
        }

        .panel.open {
            bottom: 0;
        }

        .handle {
            width: 45px;
            height: 5px;
            background: #333;
            border-radius: 10px;
            margin: 0 auto 25px;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .grid-item {
            background: #22252C;
            padding: 15px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid transparent;
            font-size: 14px;
        }

        .grid-item.active {
            background: rgba(210, 227, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .grid-item b {
            display: block;
            font-size: 18px;
        }

        #libList {
            overflow-y: auto;
            height: 85%;
            scrollbar-width: none;
        }

        #libList::-webkit-scrollbar {
            display: none;
        }

        .song-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .song-row:active {
            background: rgba(255, 255, 255, 0.05);
        }

        /* CHANGE: Playlist image loading UI */
        .img-box {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: #181A1F;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .img-box::after {
            content: "music_note";
            font-family: 'Material Symbols Rounded';
            font-size: 24px;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            z-index: 0;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: 0.3s;
        }

        .img-box img.loaded {
            opacity: 1;
        }

        /* Views Layout */
        .view {
            width: 100vw;
            height: 100vh;
            position: absolute;
            inset: 0;
            display: none;
            overflow: hidden;
        }

        #playerView {
            align-items: center;
            justify-content: space-around;
            padding: 40px 25px;
        }

        #homeView {
            padding: 30px 24px 110px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #homeView::-webkit-scrollbar {
            display: none;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* Home View Custom Styles */
        .home-header {
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .home-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .home-header p {
            font-size: 14px;
            color: var(--accent);
            opacity: 0.7;
            margin-top: 5px;
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 25px 0 15px;
            color: #fff;
            opacity: 0.9;
        }

        /* Recently Played Scroll-Snap Slider */
        .slider-outer {
            width: 100%;
            overflow-x: auto;
            display: flex;
            scrollbar-width: none;
            margin-bottom: 20px;
            scroll-snap-type: x mandatory;
            scroll-padding: 0 24px;
            gap: 15px;
            padding: 10px 0;
        }

        .slider-outer::-webkit-scrollbar {
            display: none;
        }

        .slider-card {
            flex: 0 0 calc(100vw - 80px);
            max-width: 280px;
            height: 320px;
            scroll-snap-align: center;
            border-radius: 36px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.35s ease;
            opacity: 0.6;
            transform: scale(0.9);
        }

        .slider-card:active {
            transform: scale(0.94) !important;
        }

        .slider-card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: transform 0.5s ease;
        }

        .slider-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 40%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        .slider-card-info {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .slider-card-info b {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .slider-card-info span {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Artist Rows & Square Song Cards */
        .artist-section {
            margin-bottom: 25px;
        }

        .artist-section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 2px;
        }

        .artist-section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
            display: inline-block;
        }

        .artist-row-slider {
            width: 100%;
            overflow-x: auto;
            display: flex;
            scrollbar-width: none;
            gap: 15px;
            padding-bottom: 5px;
        }

        .artist-row-slider::-webkit-scrollbar {
            display: none;
        }

        .song-square-card {
            width: 125px;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .song-square-card:active {
            transform: scale(0.93) translateY(2px);
        }

        .song-square-card-img-box {
            width: 125px;
            height: 125px;
            border-radius: 20px;
            overflow: hidden;
            background: #181A1F;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .song-square-card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .song-square-card:active .song-square-card-img-box img {
            transform: scale(1.08);
        }

        .song-square-card-img-box img.loaded {
            opacity: 1;
        }

        .song-square-card-info {
            margin-top: 8px;
            padding: 0 2px;
        }

        .song-square-card-title {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .song-square-card-artist {
            font-size: 11px;
            color: var(--accent);
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* Floating Bubble Mini Player */
        #bubblePlayer {
            position: fixed;
            right: 20px;
            bottom: 30px;
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: #0C0D10;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(210, 227, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        #bubblePlayer:active {
            transform: scale(0.9);
        }

        #bubblePlayer img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            z-index: 2;
            transition: transform 0.5s ease;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Spin animation for disc */
        @keyframes spinDisc {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: spinDisc 12s linear infinite;
        }

        .spinning-paused {
            animation-play-state: paused;
        }

        /* Player Header & Controls */
        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
        }

        .player-header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .btn-ui-small {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-ui-small:active {
            opacity: 1;
            transform: scale(0.92);
        }

        .btn-ui-small .material-symbols-rounded {
            font-size: 24px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
        }

        .btn-ui {
            opacity: 0.6;
        }

        .btn-ui:active {
            opacity: 1;
        }

        .play-btn {
            opacity: 1;
        }

        .btn-ui.active-btn {
            color: var(--accent) !important;
            opacity: 1 !important;
            text-shadow: 0 0 10px rgba(210, 227, 255, 0.4);
asa        }

        /* Overrides to original .app settings for view switching */
        .app {
            padding: 0;
            justify-content: flex-start;
        }
    </style>
</head>

<body id="mainBG">

    <div class="app">
        <div class="backdrop" id="bgCloser" onclick="closePanels()"></div>

        <!-- Home View -->
        <div id="homeView" class="view active">
            <div class="home-header">
                <h1>Explore</h1>
            </div>

            <!-- Recently Played Slider -->
            <div id="recentSection" style="display: none;">
                <div class="section-title">Recently Played</div>
                <div class="slider-outer" id="recentSliderTrack">
                    <!-- Dynamic Slider Cards -->
                </div>
            </div>

            <!-- Artist Rows Container -->
            <div id="artistSectionsContainer">
                <!-- Dynamic artist rows with horizontal scrolling square song cards -->
            </div>
        </div>

        <!-- Player View -->
        <div id="playerView" class="view">
            <!-- Player Top Navigation Bar -->
            <div class="player-header">
                <button class="btn-ui-small" onclick="showHomeView()"><span class="material-symbols-rounded">arrow_back_ios</span></button>
                <span class="player-header-title">Now Playing</span>
                <button class="btn-ui-small" onclick="openPanel('sleepPanel')"><span class="material-symbols-rounded">more_time</span></button>
            </div>

            <div class="cover-area" id="swipeArea">
                <div class="seek-overlay" id="rewindIco" style="left: 20%;"></div>
                <div class="seek-overlay" id="forwardIco" style="right: 20%;"></div>
                <div class="tap-zone left-zone" id="tapBack"></div>
                <div class="tap-zone right-zone" id="tapNext"></div>
                <div class="cover-box"><img id="art" src=""></div>
            </div>

            <div class="meta">
                <h1 id="title">Loading...</h1>
                <p id="artist">Artist</p>
                <div class="status-pill" id="pill">LIMIT: OFF</div>
            </div>

            <div class="seekbar-box">
                <div class="track" id="rail"></div>
                <div class="times"><span id="curr">0:00</span><span id="dur">0:00</span></div>
            </div>

            <div class="controls">
                <button class="btn-ui" id="shuffleBtn" onclick="toggleShuffle()"><span
                        class="material-symbols-rounded">shuffle</span></button>
                <button class="btn-ui" onclick="prev()"><span class="material-symbols-rounded">skip_previous</span></button>
                <button class="btn-ui play-btn" onclick="toggle()"><span class="material-symbols-rounded"
                        id="pIco">play_arrow</span></button>
                <button class="btn-ui" onclick="next()"><span class="material-symbols-rounded">skip_next</span></button>
                <button class="btn-ui" id="repeatBtn" onclick="toggleRepeat()"><span
                        class="material-symbols-rounded">repeat</span></button>
            </div>
        </div>

        <!-- Floating Bubble Mini-Player -->
        <div id="bubblePlayer" onclick="showPlayerView()">
            <svg class="progress-ring" width="66" height="66">
                <circle class="progress-ring-bg" cx="33" cy="33" r="28" stroke="rgba(255,255,255,0.15)" stroke-width="3" fill="transparent" />
                <circle id="bubbleProgress" cx="33" cy="33" r="28" stroke="var(--accent)" stroke-width="3" fill="transparent" stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="176" />
            </svg>
            <img id="bubbleArt" class="spinning spinning-paused" src="" alt="cover">
        </div>

        <!-- Sleep Panel -->
        <div class="panel" id="sleepPanel">
            <div class="handle" onclick="closePanels()"></div>
            <h2 style="font-family:Montserrat">Sleep Timer</h2>
            <div class="grid">
                <div class="grid-item" id="m5" onclick="setSleep('mins', 5)"><b>5</b>min</div>
                <div class="grid-item" id="m10" onclick="setSleep('mins', 10)"><b>10</b>min</div>
                <div class="grid-item" id="m20" onclick="setSleep('mins', 20)"><b>20</b>min</div>
                <div class="grid-item" id="m25" onclick="setSleep('mins', 25)"><b>25</b>min</div>
                <div class="grid-item" id="m30" onclick="setSleep('mins', 30)"><b>30</b>min</div>
                <div class="grid-item" id="m40" onclick="setSleep('mins', 40)"><b>40</b>min</div>
                <div class="grid-item" id="m50" onclick="setSleep('mins', 50)"><b>50</b>min</div>
                <div class="grid-item" id="m60" onclick="setSleep('mins', 60)"><b>60</b>min</div>
                <div class="grid-item" style="background:#311; color:#f55" onclick="setSleep('off', 0)"><b>OFF</b>Limit
                </div>
            </div>
            <p style="margin: 25px 0 10px; opacity:0.5; font-size:12px;">SET SONG LIMIT</p>
            <div class="grid">
                <div class="grid-item" id="s1" onclick="setSleep('songs', 1)"><b>1</b>Song</div>
                <div class="grid-item" id="s5" onclick="setSleep('songs', 5)"><b>5</b>Songs</div>
                <div class="grid-item" id="s10" onclick="setSleep('songs', 10)"><b>10</b>Songs</div>
            </div>
        </div>

        <!-- Artist Tracks Panel is no longer needed since songs are grouped directly on the dashboard -->
    </div>

    <script src="data.js?v=2"></script>
    <script>
        let idx = parseInt(localStorage.getItem('lastPlayedSongIndex')) || 0;
        if (idx >= songs.length || idx < 0) idx = 0;
        let playing = false;
        let songSelected = false;
        let songLimit = 0, songCount = 0, timeEnd = 0;
        let shuffleActive = false;
        let repeatState = 0; // 0 = off, 1 = repeat all, 2 = repeat one
        const audio = new Audio();
        audio.autoplay = false;

        function toggleShuffle() {
            shuffleActive = !shuffleActive;
            const btn = document.getElementById("shuffleBtn");
            if (shuffleActive) {
                btn.classList.add("active-btn");
            } else {
                btn.classList.remove("active-btn");
            }
        }

        function toggleRepeat() {
            repeatState = (repeatState + 1) % 3;
            const btn = document.getElementById("repeatBtn");
            const icon = btn.querySelector(".material-symbols-rounded");

            if (repeatState === 0) {
                icon.innerText = "repeat";
                btn.classList.remove("active-btn");
            } else if (repeatState === 1) {
                icon.innerText = "repeat";
                btn.classList.add("active-btn");
            } else if (repeatState === 2) {
                icon.innerText = "repeat_one";
                btn.classList.add("active-btn");
            }
        }

        function load(n) {
            localStorage.setItem('lastPlayedSongIndex', n);
            const s = songs[n];
            songSelected = true;

            // Generate waveform bars dynamically
            generateWaveform(n);

            // CHANGE: Image loading handling
            const art = document.getElementById("art");
            art.classList.remove("loaded"); // Naye song pe image hide karo (background icon dikhega)
            art.src = s.cover;
            art.onload = () => art.classList.add("loaded"); // Fully load hone pe fade-in
            art.onerror = () => art.classList.remove("loaded"); // Error aaye to hide hi rakho

            // Update floating bubble art
            const bubbleArt = document.getElementById("bubbleArt");
            bubbleArt.src = s.cover;

            audio.src = s.url;
            audio.load();

            document.getElementById("title").innerText = s.name;
            document.getElementById("artist").innerText = s.artist;
            document.getElementById("mainBG").style.backgroundColor = `hsl(${(n * 75) % 360}, 15%, 7%)`;

            // Track Recently Played
            addToRecentlyPlayed(n);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.name,
                    artist: s.artist,
                    artwork: [{ src: s.cover, sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('previoustrack', prev);
                navigator.mediaSession.setActionHandler('nexttrack', next);
            }
            
            updateBubblePlayerVisibility();
        }

        function generateWaveform(n) {
            const rail = document.getElementById("rail");
            rail.innerHTML = "";
            const numBars = 45;
            let seed = n + 1;
            function seededRandom() {
                let x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            }
            for (let i = 0; i < numBars; i++) {
                const bar = document.createElement("div");
                bar.className = "wave-bar";
                const progress = i / numBars;
                const sineFactor = Math.sin(progress * Math.PI);
                const heightPercent = 20 + (sineFactor * 55) + (seededRandom() * 25);
                bar.style.height = `${heightPercent}%`;
                rail.appendChild(bar);
            }
        }

        function playSong() {
            playing = true;
            audio.autoplay = true;
            document.getElementById("pIco").innerText = "pause";
            document.getElementById("bubbleArt").classList.remove("spinning-paused");

            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Auto-play blocked by Android/Browser", error);
                    playing = false;
                    document.getElementById("pIco").innerText = "play_arrow";
                    document.getElementById("bubbleArt").classList.add("spinning-paused");
                });
            }
        }

        function toggle() {
            const ico = document.getElementById("pIco");
            if (playing) {
                audio.pause();
                audio.autoplay = false;
                ico.innerText = "play_arrow";
                playing = false;
                document.getElementById("bubbleArt").classList.add("spinning-paused");
            } else {
                playSong();
            }
        }

        function next() {
            if (shuffleActive) {
                idx = Math.floor(Math.random() * songs.length);
            } else {
                idx = (idx + 1) % songs.length;
            }
            load(idx);
            if (playing) playSong();
        }

        function prev() {
            if (shuffleActive) {
                idx = Math.floor(Math.random() * songs.length);
            } else {
                idx = (idx - 1 + songs.length) % songs.length;
            }
            load(idx);
            if (playing) playSong();
        }

        audio.addEventListener('ended', () => {
            if (songLimit > 0) {
                songCount++;
                if (songCount >= songLimit) { stopAll(); return; }
            }

            if (repeatState === 2) {
                load(idx);
                playSong();
            } else {
                if (idx === songs.length - 1 && repeatState === 0 && !shuffleActive) {
                    stopAll();
                } else {
                    next();
                }
            }
        });

        function stopAll() {
            audio.pause();
            audio.autoplay = false;
            playing = false;
            document.getElementById("pIco").innerText = "play_arrow";
            document.getElementById("bubbleArt").classList.add("spinning-paused");
            setSleep('off', 0);
        }

        audio.ontimeupdate = () => {
            document.getElementById("curr").innerText = fmt(audio.currentTime);
            document.getElementById("dur").innerText = fmt(audio.duration);

            // Update waveform bars
            const bars = document.querySelectorAll(".wave-bar");
            if (bars.length > 0) {
                const activeCount = Math.floor((audio.currentTime / audio.duration) * bars.length);
                bars.forEach((bar, index) => {
                    if (index < activeCount) {
                        bar.classList.add("active");
                    } else {
                        bar.classList.remove("active");
                    }
                });
            }

            // Update circular progress ring on Bubble Mini-player
            const circ = 176;
            const offset = circ - ((audio.currentTime / audio.duration) * circ);
            document.getElementById("bubbleProgress").style.strokeDashoffset = isNaN(offset) ? circ : offset;

            if (timeEnd > 0 && Date.now() >= timeEnd) stopAll();
        };

        document.getElementById("rail").onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            audio.currentTime = (clickX / width) * audio.duration;
        };

        function fmt(s) {
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s / 60), r = Math.floor(s % 60);
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }

        function setSleep(type, val) {
            songLimit = 0; timeEnd = 0; songCount = 0;
            document.querySelectorAll('.grid-item').forEach(i => i.classList.remove('active'));
            const pill = document.getElementById("pill");
            if (type === 'mins') {
                timeEnd = Date.now() + (val * 60000);
                pill.innerText = `LIMIT: ${val} MINS`;
                document.getElementById('m' + val).classList.add('active');
            } else if (type === 'songs') {
                songLimit = val;
                pill.innerText = `LIMIT: ${val} SONGS`;
                document.getElementById('s' + val).classList.add('active');
            } else {
                pill.innerText = "LIMIT: OFF";
            }
            setTimeout(closePanels, 300);
        }

        function tapSeek(el, sec, iconId) {
            let last = 0;
            el.addEventListener('touchstart', (e) => {
                let now = Date.now();
                if (now - last < 300) {
                    audio.currentTime += sec;
                    const ico = document.getElementById(iconId);
                    ico.classList.add('active-seek');
                    setTimeout(() => ico.classList.remove('active-seek'), 500);
                }
                last = now;
            });
        }
        tapSeek(document.getElementById("tapBack"), -10, "rewindIco");
        tapSeek(document.getElementById("tapNext"), 10, "forwardIco");

        function openPanel(id) {
            document.getElementById(id).classList.add('open');
            document.getElementById('bgCloser').classList.add('active');
            history.pushState({ panel: id }, "");
        }
        function closePanels() {
            document.querySelectorAll('.panel, .backdrop').forEach(el => el.classList.remove('open', 'active'));
        }

        // View Navigation
        function showHomeView() {
            document.getElementById("playerView").classList.remove("active");
            document.getElementById("homeView").classList.add("active");
            updateBubblePlayerVisibility();
        }

        function showPlayerView() {
            document.getElementById("homeView").classList.remove("active");
            document.getElementById("playerView").classList.add("active");
            updateBubblePlayerVisibility();
            history.pushState({ view: 'player' }, "");
        }

        function updateBubblePlayerVisibility() {
            const bubble = document.getElementById("bubblePlayer");
            const isHomeActive = document.getElementById("homeView").classList.contains("active");
            if (songSelected && isHomeActive) {
                bubble.style.display = "flex";
            } else {
                bubble.style.display = "none";
            }
        }

        // Recently Played Logic
        function addToRecentlyPlayed(n) {
            let recent = JSON.parse(localStorage.getItem('recentSongs')) || [];
            recent = recent.filter(item => item !== n);
            recent.unshift(n);
            if (recent.length > 5) recent.pop();
            localStorage.setItem('recentSongs', JSON.stringify(recent));
            renderRecentlyPlayed();
        }

        function renderRecentlyPlayed() {
            const recent = JSON.parse(localStorage.getItem('recentSongs')) || [];
            const track = document.getElementById("recentSliderTrack");
            const section = document.getElementById("recentSection");

            if (recent.length === 0) {
                section.style.display = "none";
                return;
            }
            section.style.display = "block";
            track.innerHTML = "";

            recent.forEach(n => {
                if (n >= songs.length) return;
                const s = songs[n];
                const card = document.createElement("div");
                card.className = "slider-card";
                card.innerHTML = `
                    <img class="slider-card-bg" src="${s.cover}" alt="${s.name}">
                    <div class="slider-card-overlay"></div>
                    <div class="slider-card-info">
                        <b>${s.name}</b>
                        <span>${s.artist}</span>
                    </div>
                `;
                card.onclick = () => {
                    idx = n;
                    load(n);
                    playSong();
                    showPlayerView();
                };
                track.appendChild(card);
            });

            setTimeout(updateSliderSnapping, 50);
        }

        function updateSliderSnapping() {
            const slider = document.getElementById("recentSliderTrack");
            const cards = slider.querySelectorAll(".slider-card");
            if (cards.length === 0) return;
            const sliderCenter = slider.scrollLeft + slider.offsetWidth / 2;
            cards.forEach(card => {
                const cardCenter = card.offsetLeft + card.offsetWidth / 2;
                const distanceFromCenter = Math.abs(sliderCenter - cardCenter);

                // Transition distance (half slider width)
                const maxDist = slider.offsetWidth * 0.6;
                const factor = Math.max(0, 1 - (distanceFromCenter / maxDist));

                const scale = 0.9 + (factor * 0.1); // 0.9 to 1.0
                const opacity = 0.6 + (factor * 0.4); // 0.6 to 1.0
                const glow = factor * 12;

                card.style.transform = `scale(${scale})`;
                card.style.opacity = opacity;
            });
        }

        // Artists Logic & Horizontal Sections
        function getUniqueArtists() {
            const artists = {};
            songs.forEach((s, i) => {
                // Split artist names by " x " or " X " to handle collaborations
                const names = s.artist.split(/\s+[xX]\s+/);
                names.forEach(name => {
                    const cleanName = name.trim();
                    if (cleanName === "") return;
                    if (!artists[cleanName]) {
                        artists[cleanName] = {
                            name: cleanName,
                            songIndices: []
                        };
                    }
                    if (!artists[cleanName].songIndices.includes(i)) {
                        artists[cleanName].songIndices.push(i);
                    }
                });
            });

            // Convert to array and sort by songCount descending (most songs first)
            const artistsList = Object.values(artists);
            artistsList.sort((a, b) => b.songIndices.length - a.songIndices.length);

            return artistsList;
        }

        function renderArtistSections() {
            const container = document.getElementById("artistSectionsContainer");
            container.innerHTML = "";

            const artists = getUniqueArtists();

            artists.forEach(a => {
                const section = document.createElement("div");
                section.className = "artist-section";

                const title = document.createElement("div");
                title.className = "artist-section-title";
                title.innerText = a.name;
                section.appendChild(title);

                const slider = document.createElement("div");
                slider.className = "artist-row-slider";

                a.songIndices.forEach(i => {
                    const s = songs[i];
                    const card = document.createElement("div");
                    card.className = "song-square-card";
                    card.innerHTML = `
                        <div class="song-square-card-img-box">
                            <img src="${s.cover}" alt="${s.name}" onload="this.classList.add('loaded')">
                        </div>
                        <div class="song-square-card-info">
                            <div class="song-square-card-title">${s.name}</div>
                            <div class="song-square-card-artist">${s.artist}</div>
                        </div>
                    `;
                    card.onclick = () => {
                        idx = i;
                        load(i);
                        playSong();
                        showPlayerView();
                    };
                    slider.appendChild(card);
                });

                section.appendChild(slider);
                container.appendChild(section);
            });
        }

        // Mobile Gestures
        let startX = 0, startY = 0;
        document.addEventListener('touchstart', e => { 
            startX = e.touches[0].clientX; 
            startY = e.touches[0].clientY; 
        });
        document.addEventListener('touchend', e => {
            // Only handle next/prev swipe gesture if player screen is open/active
            if (!document.getElementById("playerView").classList.contains("active")) return;

            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;
            let diffX = startX - endX;
            let diffY = startY - endY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 50) { diffX > 0 ? next() : prev(); }
            }
        });

        window.onpopstate = (e) => {
            closePanels();
            if (e.state && e.state.view === 'player') {
                document.getElementById("homeView").classList.remove("active");
                document.getElementById("playerView").classList.add("active");
                updateBubblePlayerVisibility();
            } else {
                document.getElementById("playerView").classList.remove("active");
                document.getElementById("homeView").classList.add("active");
                updateBubblePlayerVisibility();
            }
        };

        window.onload = () => {
            load(idx);

            // Render Artist Sections directly on the Home Page
            renderArtistSections();

            // Render Recently Played
            renderRecentlyPlayed();

            // Bind coverflow scroll snapped animation listener
            const recentSlider = document.getElementById("recentSliderTrack");
            recentSlider.addEventListener("scroll", updateSliderSnapping);
            setTimeout(updateSliderSnapping, 100);

            // Init visibility
            updateBubblePlayerVisibility();
        };
    </script>
</body>

</html>
