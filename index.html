<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro Android Player Final</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root { --accent: #D2E3FF; --bg: #0C0D10; --overlay-bg: #181A1F; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body, html { 
    background: var(--bg); 
    color: #fff; 
    overflow: hidden; 
    font-family: 'Outfit', sans-serif; 
    transition: background 0.8s ease; 
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  *::-webkit-scrollbar { display: none; }

  .app { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px 25px; position: relative; }

  .seek-overlay { position: absolute; top: 50%; transform: translateY(-50%); font-size: 40px; color: #fff; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 10; }
  .active-seek { opacity: 1; transform: translateY(-50%) scale(1.2); }

  .cover-area { position: relative; width: 100%; max-width: 320px; aspect-ratio: 1/1; }
  
  /* CHANGE: Cover box loading UI */
  .cover-box { 
    width: 100%; height: 100%; border-radius: 40px; overflow: hidden; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.7); 
    background: #181A1F; display: flex; align-items: center; justify-content: center; position: relative;
  }
  .cover-box::after {
    content: "music_note";
    font-family: 'Material Symbols Rounded';
    font-size: 100px; color: rgba(255,255,255,0.05); position: absolute; z-index: 0;
  }
  .cover-box img { 
    width: 100%; height: 100%; object-fit: cover; 
    position: relative; z-index: 1; 
    opacity: 0; transition: opacity 0.5s ease; /* Smooth fade in */
  }
  .cover-box img.loaded { opacity: 1; }

  .tap-zone { position: absolute; top:0; width: 50%; height: 100%; z-index: 5; }
  .left-zone { left: 0; } .right-zone { right: 0; }

  .meta { width: 100%; max-width: 320px; }
  .meta h1 { font-family: 'Montserrat'; font-size: 24px; }
  .meta p { font-size: 16px; color: var(--accent); opacity: 0.8; font-weight: 300; }
  .status-pill { background: rgba(210, 227, 255, 0.15); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 15px; display: inline-block; border: 1px solid rgba(210, 227, 255, 0.2); }

  .seekbar-box { width: 100%; max-width: 320px; margin: 20px 0; }
  .track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; cursor: pointer; }
  .fill { position: absolute; height: 100%; background: var(--accent); border-radius: 10px; width: 0%; pointer-events: none; }
  .fill::after { content: ""; position: absolute; right: -7px; top: -4px; width: 16px; height: 16px; background: #fff; border-radius: 50%; }
  .times { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: #777; font-weight: bold; }

  .controls { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 320px; }
  .btn-ui { background: none; border: none; color: #fff; cursor: pointer; transition: 0.2s; }
  .btn-ui .material-symbols-rounded { font-size: 32px; font-variation-settings: 'FILL' 1; }
  .play-btn { width: 80px; height: 80px; background: var(--accent); color: #000; border-radius: 30px; display: flex; align-items: center; justify-content: center; }
  .play-btn .material-symbols-rounded { font-size: 45px; }

  .backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 15; }
  .backdrop.active { display: block; }
  .panel { 
    position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; 
    background: var(--overlay-bg); border-radius: 40px 40px 0 0; 
    transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1); z-index: 20; padding: 30px 20px; 
    scrollbar-width: none; 
  }
  .panel.open { bottom: 0; }
  .handle { width: 45px; height: 5px; background: #333; border-radius: 10px; margin: 0 auto 25px; cursor: pointer; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
  .grid-item { background: #22252C; padding: 15px 5px; border-radius: 15px; text-align: center; border: 1px solid transparent; font-size: 14px; }
  .grid-item.active { background: rgba(210, 227, 255, 0.15); border-color: var(--accent); color: var(--accent); }
  .grid-item b { display: block; font-size: 18px; }

  #libList { overflow-y: auto; height: 85%; scrollbar-width: none; }
  #libList::-webkit-scrollbar { display: none; }

  .song-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 20px; margin-bottom: 8px; }
  .song-row:active { background: rgba(255,255,255,0.05); }

  /* CHANGE: Playlist image loading UI */
  .img-box {
    width: 50px; height: 50px; border-radius: 15px; background: #181A1F;
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .img-box::after {
    content: "music_note";
    font-family: 'Material Symbols Rounded';
    font-size: 24px; color: rgba(255,255,255,0.05); position: absolute; z-index: 0;
  }
  .img-box img {
    width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1; opacity: 0; transition: 0.3s;
  }
  .img-box img.loaded { opacity: 1; }
</style>
</head>
<body id="mainBG">

<div class="app">
  <div class="backdrop" id="bgCloser" onclick="closePanels()"></div>

  <div class="cover-area" id="swipeArea">
    <div class="seek-overlay" id="rewindIco" style="left: 20%;"></div>
    <div class="seek-overlay" id="forwardIco" style="right: 20%;"></div>
    <div class="tap-zone left-zone" id="tapBack"></div>
    <div class="tap-zone right-zone" id="tapNext"></div>
    <div class="cover-box"><img id="art" src=""></div>
  </div>

  <div class="meta">
    <h1 id="title">Loading...</h1>
    <p id="artist">Artist</p>
    <div class="status-pill" id="pill">LIMIT: OFF</div>
  </div>

  <div class="seekbar-box">
    <div class="track" id="rail"><div class="fill" id="fill"></div></div>
    <div class="times"><span id="curr">0:00</span><span id="dur">0:00</span></div>
  </div>

  <div class="controls">
    <button class="btn-ui" onclick="openPanel('sleepPanel')"><span class="material-symbols-rounded">more_time</span></button>
    <button class="btn-ui" onclick="prev()"><span class="material-symbols-rounded">skip_previous</span></button>
    <button class="btn-ui play-btn" onclick="toggle()"><span class="material-symbols-rounded" id="pIco">play_arrow</span></button>
    <button class="btn-ui" onclick="next()"><span class="material-symbols-rounded">skip_next</span></button>
    <button class="btn-ui" onclick="openPanel('libPanel')"><span class="material-symbols-rounded">sort</span></button>
  </div>

  <div class="panel" id="sleepPanel">
    <div class="handle" onclick="closePanels()"></div>
    <h2 style="font-family:Montserrat">Sleep Timer</h2>
    <div class="grid">
      <div class="grid-item" id="m5" onclick="setSleep('mins', 5)"><b>5</b>min</div>
      <div class="grid-item" id="m10" onclick="setSleep('mins', 10)"><b>10</b>min</div>
      <div class="grid-item" id="m20" onclick="setSleep('mins', 20)"><b>20</b>min</div>
      <div class="grid-item" id="m25" onclick="setSleep('mins', 25)"><b>25</b>min</div>
      <div class="grid-item" id="m30" onclick="setSleep('mins', 30)"><b>30</b>min</div>
      <div class="grid-item" id="m40" onclick="setSleep('mins', 40)"><b>40</b>min</div>
      <div class="grid-item" id="m50" onclick="setSleep('mins', 50)"><b>50</b>min</div>
      <div class="grid-item" id="m60" onclick="setSleep('mins', 60)"><b>60</b>min</div>
      <div class="grid-item" style="background:#311; color:#f55" onclick="setSleep('off', 0)"><b>OFF</b>Limit</div>
    </div>
    <p style="margin: 25px 0 10px; opacity:0.5; font-size:12px;">SET SONG LIMIT</p>
    <div class="grid">
        <div class="grid-item" id="s1" onclick="setSleep('songs', 1)"><b>1</b>Song</div>
        <div class="grid-item" id="s5" onclick="setSleep('songs', 5)"><b>5</b>Songs</div>
        <div class="grid-item" id="s10" onclick="setSleep('songs', 10)"><b>10</b>Songs</div>
    </div>
  </div>

  <div class="panel" id="libPanel">
    <div class="handle" onclick="closePanels()"></div>
    <h2 style="font-family:Montserrat; margin-bottom:20px;">Playlist</h2>
    <div id="libList"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
  let idx = parseInt(localStorage.getItem('lastPlayedSongIndex')) || 0;
  let playing = false;
  let songLimit = 0, songCount = 0, timeEnd = 0;
  const audio = new Audio();
  audio.autoplay = false; 

  function load(n) {
    localStorage.setItem('lastPlayedSongIndex', n); 
    const s = songs[n];
    
    // CHANGE: Image loading handling
    const art = document.getElementById("art");
    art.classList.remove("loaded"); // Naye song pe image hide karo (background icon dikhega)
    art.src = s.cover;
    art.onload = () => art.classList.add("loaded"); // Fully load hone pe fade-in
    art.onerror = () => art.classList.remove("loaded"); // Error aaye to hide hi rakho

    audio.src = s.url;
    audio.load(); 
    
    document.getElementById("title").innerText = s.name;
    document.getElementById("artist").innerText = s.artist;
    document.getElementById("mainBG").style.backgroundColor = `hsl(${(n*75)%360}, 15%, 7%)`;

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: s.name,
        artist: s.artist,
        artwork: [{ src: s.cover, sizes: '512x512', type: 'image/jpeg' }]
      });
      navigator.mediaSession.setActionHandler('previoustrack', prev);
      navigator.mediaSession.setActionHandler('nexttrack', next);
    }
  }

  function playSong() {
    playing = true;
    audio.autoplay = true; 
    document.getElementById("pIco").innerText = "pause";
    
    let playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.catch(error => {
        console.log("Auto-play blocked by Android/Browser", error);
        playing = false;
        document.getElementById("pIco").innerText = "play_arrow";
      });
    }
  }

  function toggle() {
    const ico = document.getElementById("pIco");
    if(playing) { 
      audio.pause(); 
      audio.autoplay = false; 
      ico.innerText = "play_arrow"; 
      playing = false;
    } else { 
      playSong(); 
    }
  }

  function next() { 
    idx = (idx + 1) % songs.length; 
    load(idx); 
    if(playing) playSong(); 
  }
  
  function prev() { 
    idx = (idx - 1 + songs.length) % songs.length; 
    load(idx); 
    if(playing) playSong(); 
  }

  audio.addEventListener('ended', () => {
    if(songLimit > 0) {
      songCount++;
      if(songCount >= songLimit) { stopAll(); return; }
    }
    next(); 
  });

  function stopAll() { 
    audio.pause(); 
    audio.autoplay = false;
    playing = false; 
    document.getElementById("pIco").innerText = "play_arrow"; 
    setSleep('off',0); 
  }

  audio.ontimeupdate = () => {
    const p = (audio.currentTime / audio.duration) * 100;
    document.getElementById("fill").style.width = p + "%";
    document.getElementById("curr").innerText = fmt(audio.currentTime);
    document.getElementById("dur").innerText = fmt(audio.duration);
    if(timeEnd > 0 && Date.now() >= timeEnd) stopAll();
  };

  document.getElementById("rail").onclick = (e) => {
    audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
  };

  function fmt(s) { 
    if (isNaN(s)) return "0:00";
    let m = Math.floor(s/60), r = Math.floor(s%60); 
    return `${m}:${r<10?'0':''}${r}`; 
  }

  function setSleep(type, val) {
    songLimit = 0; timeEnd = 0; songCount = 0;
    document.querySelectorAll('.grid-item').forEach(i => i.classList.remove('active'));
    const pill = document.getElementById("pill");
    if(type === 'mins') {
      timeEnd = Date.now() + (val * 60000);
      pill.innerText = `LIMIT: ${val} MINS`;
      document.getElementById('m'+val).classList.add('active');
    } else if(type === 'songs') {
      songLimit = val;
      pill.innerText = `LIMIT: ${val} SONGS`;
      document.getElementById('s'+val).classList.add('active');
    } else {
      pill.innerText = "LIMIT: OFF";
    }
    setTimeout(closePanels, 300);
  }

  function tapSeek(el, sec, iconId) {
    let last = 0;
    el.addEventListener('touchstart', (e) => {
        let now = Date.now();
        if(now - last < 300) {
            audio.currentTime += sec;
            const ico = document.getElementById(iconId);
            ico.classList.add('active-seek');
            setTimeout(() => ico.classList.remove('active-seek'), 500);
        }
        last = now;
    });
  }
  tapSeek(document.getElementById("tapBack"), -10, "rewindIco");
  tapSeek(document.getElementById("tapNext"), 10, "forwardIco");

  function openPanel(id) {
    document.getElementById(id).classList.add('open');
    document.getElementById('bgCloser').classList.add('active');
    history.pushState({panel: id}, "");
  }
  function closePanels() {
    document.querySelectorAll('.panel, .backdrop').forEach(el => el.classList.remove('open', 'active'));
  }

  let startX = 0, startY = 0;
  document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
  document.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
    let diffX = startX - endX, diffY = startY - endY;
    if (Math.abs(diffX) > Math.abs(diffY)) {
      if (Math.abs(diffX) > 50) { diffX > 0 ? next() : prev(); }
    } else {
      if (Math.abs(diffY) > 50) { diffY > 0 ? openPanel('libPanel') : closePanels(); }
    }
  });

  window.onpopstate = () => closePanels();

  window.onload = () => {
    load(idx);
    songs.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "song-row";
      // CHANGE: Playlist image me loading animation aur fallback add kiya hai
      row.innerHTML = `<div class="img-box"><img src="${s.cover}" onload="this.classList.add('loaded')" onerror="this.classList.remove('loaded')"></div><div><b>${s.name}</b><br><small style="opacity:0.5">${s.artist}</small></div>`;
      row.onclick = () => { idx=i; load(i); playSong(); closePanels(); };
      document.getElementById("libList").appendChild(row);
    });
  };
</script>
</body>
</html>
